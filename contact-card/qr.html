<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stuart Kerr - QR Code</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }
    .container {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      margin: 0 auto 12px;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .name { font-size: 22px; font-weight: 700; }
    .subtitle { font-size: 13px; opacity: 0.7; margin-bottom: 20px; }
    .qr-wrap {
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      display: inline-block;
      margin-bottom: 16px;
    }
    #qrcode canvas { display: block; }
    .hint { font-size: 12px; opacity: 0.5; margin-bottom: 20px; }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      box-shadow: 0 4px 16px rgba(37,99,235,0.4);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn:active { transform: scale(0.97); }
    @media print {
      body { background: #fff; color: #000; }
      .actions, .hint { display: none; }
      .qr-wrap { box-shadow: none; border: 2px solid #000; }
      .name { color: #000; }
      .subtitle { color: #333; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="avatar"><img src="images/profile.jpg" alt="Stuart Kerr"></div>
  <div class="name">Stuart Kerr</div>
  <div class="subtitle">Founder & Owner, ISO Vision AI</div>
  <div class="qr-wrap">
    <div id="qrcode"></div>
  </div>
  <div class="hint">Scan to view digital business card</div>
  <div class="actions">
    <button class="btn btn-primary" onclick="downloadQR()">Download QR</button>
    <button class="btn btn-secondary" onclick="shareQR()">Share</button>
    <button class="btn btn-secondary" onclick="window.print()">Print</button>
    <a class="btn btn-secondary" href="index.html">View Card</a>
  </div>
</div>

<script>
  var CARD_URL = 'https://stuart-kerr-card.netlify.app';

  var qrSize = 280;
  var qrImg = document.createElement('img');
  qrImg.src = 'https://chart.googleapis.com/chart?cht=qr&chs=' + qrSize + 'x' + qrSize + '&chl=' + encodeURIComponent(CARD_URL) + '&choe=UTF-8&chld=M|2';
  qrImg.alt = 'QR Code - Stuart Kerr';
  qrImg.width = qrSize;
  qrImg.height = qrSize;
  qrImg.style.display = 'block';
  document.getElementById('qrcode').appendChild(qrImg);

  function downloadQR() {
    var dlImg = new Image();
    dlImg.crossOrigin = 'anonymous';
    dlImg.onload = function() {
      var c = document.createElement('canvas');
      c.width = 1024; c.height = 1024;
      c.getContext('2d').drawImage(dlImg, 0, 0, 1024, 1024);
      var link = document.createElement('a');
      link.download = 'Stuart_Kerr_QR.png';
      link.href = c.toDataURL('image/png');
      link.click();
    };
    dlImg.onerror = function() {
      window.open(qrImg.src, '_blank');
    };
    dlImg.src = 'https://chart.googleapis.com/chart?cht=qr&chs=1024x1024&chl=' + encodeURIComponent(CARD_URL) + '&choe=UTF-8&chld=M|2';
  }

  async function shareQR() {
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Stuart Kerr - ISO Vision AI',
          text: 'Scan this QR code to save my contact info',
          url: CARD_URL
        });
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(CARD_URL).then(function() {
        var btns = document.querySelectorAll('.btn-secondary');
        btns[0].textContent = 'Link copied!';
        setTimeout(function() { btns[0].textContent = 'Share'; }, 2000);
      });
    }
  }
</script>

</body>
</html>
